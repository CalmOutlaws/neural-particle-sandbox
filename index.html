<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Particle Sandbox | 3D Interactive Experience</title>
    
    <!-- Meta tags for Social Media / Portfolio Thumbnails -->
    <meta name="description" content="A real-time 3D particle system controlled by hand gestures using Three.js and MediaPipe.">
    <meta name="author" content="Your Name">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">

    <!-- MediaPipe Core Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- Import Map for Modern Three.js handling -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>

    <!-- Professional Loading Overlay -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Initializing Neural Tracking...</p>
    </div>
    
    <!-- Interactive Radar (Webcam View) -->
    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>
    <div class="control-group">
    <label>Manual Spawn</label>
    <button id="addShapeBtn">+ Add New Object</button>
</div>

    <!-- Control Panel -->
    <div id="ui-panel">
    <header>
        <h3>Neural Sandbox</h3>
        <span class="badge" style="background: #ff007f;">Active</span>
    </header>

    <div class="control-group">
        <p style="font-size: 0.8rem; opacity: 0.7;">One object. Pure physics.</p>
        <button id="resetBtn" style="width: 100%; margin-top: 10px;">Reset Position</button>
    </div>

    <div class="hint-box">
        <p><strong>Open hand</strong> to expand particles.</p>
        <p><strong>Close hand</strong> to contract.</p>
        <p><strong>Pinch</strong> to grab sphere.</p>
    </div>
</div>

    <!-- Entry Point for the Application Logic -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
