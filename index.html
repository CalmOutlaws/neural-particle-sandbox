<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Particle Sandbox | 3D Interactive Experience</title>
    
    <meta name="description" content="A real-time 3D particle system controlled by complex hand gestures.">
    <meta name="author" content="Monish M">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">

    <!-- MediaPipe Core Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    
    <!-- Import Map for Modern Three.js handling -->
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
    </script>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Calibrating Neural Sensors...</p>
    </div>
    
    <!-- Webcam Radar -->
    <div id="webcam-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480"></canvas>
    </div>

    <!-- Control Panel -->
    <div id="ui-panel">
        <header>
            <h3>Neural Sandbox</h3>
            <span class="badge">v3.0 Ultra</span>
        </header>

        <div class="control-group">
            <label>Morph Geometry</label>
            <button id="shapeSphere">Sphere Mode</button>
            <button id="shapeHeart">Heart Mode</button>
        </div>

        <div class="control-group">
            <label>Neural Color</label>
            <input type="color" id="colorPicker" value="#ff007f">
        </div>

        <div class="control-group">
            <button id="resetBtn">Reset Transformation</button>
        </div>

        <div class="hint-box">
            <p><strong>• Rotate Palm:</strong> Tilt the central object.</p>
            <p><strong>• Dual Pinch:</strong> Grab with both hands.</p>
            <p><strong>• Expand Hand:</strong> Burst the particles.</p>
        </div>
    </div>

    <!-- Main Logic Entry -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
